# Drop-in de durcissement SSH.
# Installation : copier ce fichier dans /etc/ssh/sshd_config.d/ sur le VPS,
# puis exécuter `sshd -t` (test de syntaxe) et `systemctl restart sshd`.
#
# Prérequis IMPORTANT : avoir déjà déployé sa clé publique via
# `ssh-copy-id` ou `~/.ssh/authorized_keys` avant d'appliquer ce fichier,
# sous peine de se couper l'accès au serveur.

# Authentification par clé uniquement
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
AuthenticationMethods publickey

# Interdire la connexion root directe (passer par un utilisateur + sudo)
PermitRootLogin no

# Limiter la surface d'attaque
X11Forwarding no
AllowTcpForwarding no
MaxAuthTries 3
LoginGraceTime 20

# Se déconnecter des sessions inactives
ClientAliveInterval 300
ClientAliveCountMax 2
